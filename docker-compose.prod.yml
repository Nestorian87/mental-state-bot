services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mental_state_bot}
      POSTGRES_USER: ${POSTGRES_USER:-mental_state_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mental_state_bot} -d ${POSTGRES_DB:-mental_state_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bot:
    image: ${BOT_IMAGE:?set BOT_IMAGE, for example ghcr.io/owner/mental-state-bot:latest}
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mental_state_bot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mental_state_bot}
      DATABASE_SYNC_URL: postgresql+psycopg://${POSTGRES_USER:-mental_state_bot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mental_state_bot}
      MEDIA_ROOT: /app/data/media
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - media_data:/app/data/media
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
